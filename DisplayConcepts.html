<!DOCTYPE html>
<html>

<head>
    <tittle>css
    </tittle>
    <style>
        .display {
            display: block;
            background: lightblue;
        }

        span {
            display: inline;
            background: yellow;
        }

        .box {
            display: inline-block;
            width: 100px;
            height: 150px;
            background: orange;
        }
        .hide{
            display:none;
        }
    </style>
</head>

<body>
    <h1>Display Block</h1>
    <div class="display">
        <p>Explanation:</p>
        <p>display:block takes full width and starts on new line.</p>
    </div>

    <h1>Display inline</h1>
    <div class="span">
        <p>Explanation:</p>
        <p>display:inline keeps elements in same line</p>
    </div>

    <h1>Display inline-Block</h1>
    <div class="box">
        <p>Explanation:</p>
        <p>Allows width and height while staying inline</p>
    </div>
    <h1>Display None</h1>
    <div class="hide">
        <p>Explanation:</p>
        <p> Hides element completely</p>
    </div>

</body>

</html>
