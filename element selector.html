<!DOCTYPE html>
<html>
<head>
    <title>All CSS Selectors Example</title>

    <style>

        /* Global Selector */
        *{
            font-family: Arial;
            text-align: center;
        }

        /* Element Selector */
        h1{
            color: blue;
        }

        /* Class Selector */
        .sector{
            background: orange;
            color: white;
            padding: 15px;
        }

        /* ID Selector */
        #sector{
            background: green;
            color: white;
            padding: 15px;
        }

        /* Group Selector */
        h2, p, div{
            margin: 10px;
            border-radius: 10px;
        }

    </style>

</head>

<body>

    <h1>Element Selector</h1>

    <div class="sector">
        Class Selector
    </div>

    <div id="sector">
        ID Selector
    </div>

    <h2>Group Selector</h2>

    <p>This is Paragraph</p>

    <div>Normal Div Element</div>

</body>
</html>
