<!DOCTYPE html>
<html>
<head>
<style>

.container{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
  height:300px;
  border:2px solid black;
}

.box{
  width:100px;
  height:100px;
  background:orange;
  color:white;
  font-size:20px;
  text-align:center;
  line-height:100px;
}

</style>
</head>
<body>

<h2>Flexbox Example</h2>

<div class="container">
  <div class="box">1</div>
  <div class="box">2</div>
  <div class="box">3</div>
</div>

</body>
</html>
