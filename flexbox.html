<!DOCTYPE html>
<html>
<head>
<style>

.container{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:50px;
}

.box{
  width:200px;
  height:150px;
  background:orange;
  color:white;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

</style>
</head>
<body>

<h2 align="center">Flexbox Example</h2>

<div class="container">

  <div class="box">
    <h3>HTML</h3>
    <p>
      HTML is used to create the structure of web pages.
    </p>
  </div>

  <div class="box">
    <h3>CSS</h3>
    <p>
      CSS is used to design and style web pages.
    </p>
  </div>

  <div class="box">
    <h3>JavaScript</h3>
    <p>
      JavaScript is used to make web pages interactive.
    </p>
  </div>

</div>

</body>
</html>
